<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS剩余价值计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap');
        body { background: #e2e8f0; font-family: 'DM Sans', 'PingFang SC', sans-serif; min-height: 100vh; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .cycle-btn { transition: all .15s; border: 1.5px solid #e2e8f0; background: white; color: #94a3b8; font-weight: 700; font-size: 12px; border-radius: 10px; padding: 8px 0; cursor: pointer; width: 100%; }
        .cycle-btn.active { background: #00BFA5; border-color: #00BFA5; color: white; box-shadow: 0 4px 14px rgba(0,191,165,.35); }
        .field-label { font-size: 10px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        .field-input { width: 100%; padding: 11px 14px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-weight: 600; color: #1e293b; outline: none; transition: all .15s; }
        .field-input:focus { border-color: #00BFA5; background: white; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,.07); }
        .result-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .result-value { font-size: 13px; font-weight: 800; color: #1e293b; }
        @keyframes toast-in { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
        .toast-show { animation: toast-in .25s ease forwards; display: flex !important; }
        #remainingProgress { background: #00BFA5; height: 100%; transition: width 0.3s ease; }
        .rate-card { cursor: pointer; position: relative; }
        .rate-card.active { 
            background-color: #ECFEFF !important; 
            border-color: #00BFA5 !important; 
            opacity:1 !important;
        }
        .rate-card.active::after {
            content: "✓";
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 10px;
            color: #00BFA5;
            font-weight: bold;
        }
        #rateUpdateInfo {
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        #rateUpdateInfo:hover {
            color: #00BFA5 !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="toast" class="fixed top-6 left-1/2 translate-x-[-50%] z-50 pointer-events-none hidden bg-gray-900 text-white text-xs font-bold px-5 py-2.5 rounded-full shadow-2xl items-center gap-2">
    <i class="fas fa-check-circle text-emerald-400"></i><span id="toastMsg"></span>
</div>

<div class="max-w-5xl mx-auto">
    <div class="grid grid-cols-12 gap-5">
        <div class="lg:col-span-7 space-y-4">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <p class="field-label">① 续费信息</p>
                <div class="grid grid-cols-1 sm:grid-cols-5 gap-3 mb-4">
                    <div class="sm:col-span-3">
                        <div class="field-label">续费金额</div>
                        <input type="number" id="renewalAmount" class="field-input" placeholder="请输入金额" min="0" autofocus>
                    </div>
                    <div class="sm:col-span-2">
                        <div class="field-label flex justify-between">
                            <span>当前币种</span>
                            <label id="customRateToggleBox" class="flex items-center gap-1 cursor-pointer normal-case">
                                <input type="checkbox" id="useCustomRate" class="accent-[#00BFA5]"> 自定义汇率
                            </label>
                        </div>
                        <div class="field-input text-center font-bold py-2.5 flex items-center justify-center" id="selectedCurrencyText">
                            USD · 美元
                        </div>
                        <div id="customRateWrapper" class="hidden mt-2 flex items-center gap-1.5 bg-gray-50 p-1.5 rounded-lg border">
                            <span class="text-[10px] font-bold text-gray-400 pl-1">1 <span id="customRateLabel">USD</span> =</span>
                            <input type="number" id="customRateInput" class="field-input !py-1 !px-2 !text-[12px] !bg-white" placeholder="汇率" min="0">
                            <span class="text-[10px] font-bold text-gray-400 pr-1">CNY</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mt-4">
                    <div class="flex items-center justify-between mb-3">
                        <p class="text-xs font-black text-gray-400 uppercase tracking-widest">
                            <i class="fas fa-chart-area mr-1.5" style="color:#00BFA5"></i>实时汇率（点击卡片切换）
                        </p>
                        <span id="rateUpdateInfo" class="text-[10px] text-gray-500">加载中...</span>
                    </div>
                    <div class="grid grid-cols-5 gap-2" id="rateGrid"></div>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <p class="field-label">② 时间信息</p>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <div class="field-label">交易日期</div>
                        <input type="date" id="tradeDate" class="field-input">
                    </div>
                    <div>
                        <div class="field-label">到期日期</div>
                        <input type="date" id="expiryDate" class="field-input">
                    </div>
                </div>
                <div class="field-label">付款周期（按自然月/年真实天数计算）</div>
                <div class="grid grid-cols-6 gap-2" id="cycleSelector">
                    <button class="cycle-btn" data-cycle="1M">月付</button>
                    <button class="cycle-btn" data-cycle="3M">季付</button>
                    <button class="cycle-btn" data-cycle="6M">半年</button>
                    <button class="cycle-btn active" data-cycle="1Y">年付</button>
                    <button class="cycle-btn" data-cycle="2Y">两年</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <p class="field-label">③ 交易结算</p>
                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 mb-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="text-[10px] font-black text-emerald-600 mb-1.5">实付卖家 (CNY)</div>
                            <input type="number" id="actualPaid" class="field-input" min="0" placeholder="输入后自动算折溢价">
                        </div>
                        <div>
                            <div class="text-[10px] font-black text-emerald-600 mb-1.5">溢价/折价 (CNY)</div>
                            <input type="number" id="premiumInput" class="field-input" placeholder="输入后自动算总价">
                        </div>
                    </div>
                    <div id="bindHint" class="text-[9px] text-emerald-700 font-bold mt-2.5">
                        <i class="fas fa-lock mr-1"></i>正数=溢价，负数=折价，双向自动计算
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 lg:row-span-2">
            <div class="sticky top-6 bg-white rounded-2xl overflow-hidden shadow-xl border-b-4 border-[#00BFA5] p-7">
                <div class="text-center mb-6">
                    <p class="text-[#00BFA5] text-[10px] font-black tracking-widest mb-1">买家最终总支出 (CNY)</p>
                    <div id="resCNYBig" class="text-5xl font-black text-gray-800">¥ --</div>
                </div>

                <div id="premiumBox" class="hidden text-center mb-6 border-t border-gray-100 pt-4">
                    <p id="premiumTitle" class="text-[10px] font-black mb-1">卖家溢价</p>
                    <div id="premiumValueBig" class="text-2xl font-black text-red-500">--</div>
                </div>

                <div class="space-y-2 border-t border-gray-100 pt-4">
                    <div class="result-row"><span class="result-label">续费金额</span><span id="resOrig" class="result-value">--</span></div>
                    <div class="result-row"><span class="result-label">实付卖家</span><span id="resActual" class="result-value">¥ --</span></div>
                    <div class="result-row"><span class="result-label">官方日均</span><span id="dayOfficial" class="result-value">--</span></div>
                    <div class="result-row border-none"><span class="result-label text-[#00BFA5]">综合日均</span><span id="dayActual" class="result-value text-[#00BFA5]">--</span></div>
                </div>
                
                <div style="margin-top:24px">
                    <div style="display:flex; justify-content:space-between; align-items:center;font-size:10px;font-weight:800;text-transform:uppercase;margin-bottom:6px;">
                        <span style="color:#47569">剩余有效期</span>
                        <span id="remainingDays" style="color:#00BFA5;font-size:14px;font-weight:900;">-- 天</span>
                    </div>
                    <div style="background:rgba(0,0,0,.07);border-radius:99px;height:6px;overflow:hidden">
                        <div id="remainingProgress" style="width:0%"></div>
                    </div>
                    <div id="progressHint" style="text-align:right;font-size:10px;color:#475569;font-weight:700;margin-top:4px;"></div>
                </div>

                <div id="valueRatioBox" class="mt-5 pt-5 border-t border-gray-100 hidden">
                    <div class="flex justify-between text-[10px] font-black mb-1.5 uppercase text-gray-500"><span>价值构成比例</span></div>
                    <div class="h-3 bg-gray-100 rounded-full overflow-hidden flex">
                        <div id="barValue" class="h-full bg-[#00BFA5] transition-all duration-500" style="width:0%"></div>
                        <div id="barPremium" class="h-full bg-orange-400 transition-all duration-500" style="width:0%"></div>
                    </div>
                    <div class="flex gap-4 mt-2 text-[9px] font-bold" id="ratioTextWrapper">
                        <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#00BFA5]"></span>剩余价值 <span id="valuePercent" class="text-[#00BFA5]">0%</span></div>
                        <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-orange-400"></span>溢价部分 <span id="premiumPercent" class="text-orange-400">0%</span></div>
                    </div>
                </div>

                <div class="flex gap-2 mt-6">
                    <button id="copyBtn" class="flex-1 py-4 bg-[#00BFA5] rounded-xl font-black text-sm shadow-lg hover:scale-[1.02] transition-all text-white"><i class="fas fa-copy mr-2"></i>复制详情</button>
                    <button id="copyMdBtn" class="flex-1 py-4 bg-gray-700 rounded-xl font-black text-sm shadow-lg hover:scale-[1.02] transition-all text-white"><i class="fab fa-markdown mr-2"></i>复制</button>
                    <button id="resetBtn" class="flex-1 py-4 bg-red-500/10 text-red-500 rounded-xl font-black text-sm hover:scale-[1.02] transition-all"><i class="fas fa-rotate-right mr-2"></i>重置</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ====================== 性能优化版核心代码 ======================
const DOM = {
    renewalAmount: document.getElementById('renewalAmount'),
    tradeDate: document.getElementById('tradeDate'),
    expiryDate: document.getElementById('expiryDate'),
    premiumInput: document.getElementById('premiumInput'),
    actualPaid: document.getElementById('actualPaid'),
    useCustomRate: document.getElementById('useCustomRate'),
    customRateInput: document.getElementById('customRateInput'),
    resCNYBig: document.getElementById('resCNYBig'),
    resOrig: document.getElementById('resOrig'),
    resActual: document.getElementById('resActual'),
    remainingDays: document.getElementById('remainingDays'),
    remainingProgress: document.getElementById('remainingProgress'),
    progressHint: document.getElementById('progressHint'),
    dayOfficial: document.getElementById('dayOfficial'),
    dayActual: document.getElementById('dayActual'),
    rateUpdateInfo: document.getElementById('rateUpdateInfo'),
    rateGrid: document.getElementById('rateGrid'),
    premiumBox: document.getElementById('premiumBox'),
    premiumValueBig: document.getElementById('premiumValueBig'),
    premiumTitle: document.getElementById('premiumTitle'),
    valueRatioBox: document.getElementById('valueRatioBox'),
    barValue: document.getElementById('barValue'),
    barPremium: document.getElementById('barPremium'),
    valuePercent: document.getElementById('valuePercent'),
    premiumPercent: document.getElementById('premiumPercent'),
    selectedCurrencyText: document.getElementById('selectedCurrencyText'),
    customRateLabel: document.getElementById('customRateLabel'),
    customRateWrapper: document.getElementById('customRateWrapper'),
    customRateToggleBox: document.getElementById('customRateToggleBox'),
    toast: document.getElementById('toast'),
    toastMsg: document.getElementById('toastMsg')
};

let cycleType = "1Y";
let toastTimer = null;
let calculateTimer = null;
let rates = {};
let selectedCurrency = "USD";
const CACHE_12H = 12 * 60 * 60 * 1000;
let countTimer = null;
let isOfflineMode = false;

const fmt = (n, d = 2) => Number(n).toFixed(d);
const currencyList = [
    { code: 'CNY', name: '人民币' }, { code: 'USD', name: '美元' }, { code: 'EUR', name: '欧元' },
    { code: 'GBP', name: '英镑' }, { code: 'HKD', name: '港币' }, { code: 'SGD', name: '新加坡元' },
    { code: 'AUD', name: '澳元' }, { code: 'CAD', name: '加元' }, { code: 'CHF', name: '瑞士法郎' },
    { code: 'TWD', name: '新台币' }
];

// 防抖：输入时不疯狂计算，延迟 60ms 执行，大幅提升流畅度
function debounceCalculate(id) {
    clearTimeout(calculateTimer);
    calculateTimer = setTimeout(() => calculate(id), 60);
}

function formatDateTime(ts) {
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const d2 = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const i = String(d.getMinutes()).padStart(2, '0');
    const s = String(d.getSeconds()).padStart(2, '0');
    return `${y}/${m}/${d2} ${h}:${i}:${s}`;
}

function getRateCache() {
    const s = localStorage.getItem('rateCache');
    if (!s) return null;
    try { return JSON.parse(s); } catch { return null; }
}

function setRateCache(data) {
    localStorage.setItem('rateCache', JSON.stringify({ rates: data, updateTime: Date.now() }));
}

function updateRateInfoText() {
    if (isOfflineMode) {
        DOM.rateUpdateInfo.innerText = "当前为离线模式";
        return;
    }
    const cache = getRateCache();
    if (!cache) {
        DOM.rateUpdateInfo.innerText = "加载中...";
        return;
    }
    const now = Date.now();
    const updateTime = cache.updateTime;
    const left = Math.max(0, updateTime + CACHE_12H - now);
    const sec = Math.floor(left / 1000);
    const min = Math.floor(sec / 60);
    const hour = Math.floor(min / 60);

    let leftText = hour > 0 ? `${hour}时${min % 60}分`
                : min > 0 ? `${min}分${sec % 60}秒`
                : `${sec}秒`;

    DOM.rateUpdateInfo.innerText = `刷新时间：${formatDateTime(updateTime)}（剩余 ${leftText}）`;
}

function startCountDown() {
    clearInterval(countTimer);
    if (isOfflineMode) return;
    updateRateInfoText();
    countTimer = setInterval(updateRateInfoText, 1000);
}

async function refreshNow() {
    if (isOfflineMode) { showToast("离线模式无法刷新汇率"); return; }
    localStorage.removeItem('rateCache');
    DOM.rateUpdateInfo.innerText = "刷新中...";
    await fetchRealRates();
    showToast("汇率已强制刷新");
}

async function fetchRealRates() {
    const cache = getRateCache();
    if (cache && Date.now() - cache.updateTime < CACHE_12H) {
        rates = cache.rates;
        isOfflineMode = false;
        startCountDown();
        renderRateGrid();
        calculate();
        return;
    }

    try {
        const res = await fetch('https://open.er-api.com/v6/latest/CNY');
        const json = await res.json();
        const r = json.rates;
        rates = {
            USD: 1 / r.USD, EUR: 1 / r.EUR, GBP: 1 / r.GBP, HKD: 1 / r.HKD,
            SGD: 1 / r.SGD, AUD: 1 / r.AUD, CAD: 1 / r.CAD, CHF: 1 / r.CHF,
            TWD: 1 / r.TWD, CNY: 1
        };
        isOfflineMode = false;
        setRateCache(rates);
        startCountDown();
    } catch (e) {
        rates = { USD:6.88, EUR:7.38, GBP:8.12, HKD:0.88, SGD:5.18, AUD:4.55, CAD:5.02, CHF:7.61, TWD:0.22, CNY:1 };
        isOfflineMode = true;
        updateRateInfoText();
    }
    renderRateGrid();
    calculate();
}

// 一次创建DOM，不拼接innerHTML，性能提升巨大
function renderRateGrid() {
    DOM.rateGrid.innerHTML = '';
    const fragment = document.createDocumentFragment();

    currencyList.forEach(c => {
        const rt = rates[c.code];
        if (!rt) return;

        const card = document.createElement('div');
        card.className = `rate-card text-center p-2 rounded-xl border flex-col items-center border-slate-100 bg-slate-50 ${c.code === selectedCurrency ? 'active' : ''}`;
        card.dataset.code = c.code;

        const line1 = document.createElement('div');
        line1.className = 'text-[9px] font-bold text-slate-400';
        line1.textContent = `${c.code} · ${c.name}`;

        const line2 = document.createElement('div');
        line2.className = 'text-[11px] font-extrabold text-slate-700 mt-1';
        line2.textContent = rt.toFixed(3);

        card.append(line1, line2);
        fragment.appendChild(card);
    });

    DOM.rateGrid.appendChild(fragment);

    document.querySelectorAll('.rate-card').forEach(card => {
        card.onclick = () => {
            selectedCurrency = card.dataset.code;
            document.querySelectorAll('.rate-card').forEach(x => x.classList.remove('active'));
            card.classList.add('active');
            const name = currencyList.find(i => i.code === selectedCurrency)?.name;
            DOM.selectedCurrencyText.innerText = `${selectedCurrency} · ${name}`;
            DOM.customRateLabel.innerText = selectedCurrency;
            calculate();
        };
    });
}

function getRealCycleDays(startDate, cycle) {
    const s = new Date(startDate);
    const e = new Date(s);
    switch (cycle) {
        case "1M": e.setMonth(e.getMonth() + 1); break;
        case "3M": e.setMonth(e.getMonth() + 3); break;
        case "6M": e.setMonth(e.getMonth() + 6); break;
        case "1Y": e.setFullYear(e.getFullYear() + 1); break;
        case "2Y": e.setFullYear(e.getFullYear() + 2); break;
    }
    return (e - s) / 86400000;
}

function calculate(sourceInput = null) {
    const curr = selectedCurrency;
    DOM.customRateLabel.innerText = curr;
    DOM.customRateToggleBox.style.display = curr === 'CNY' ? 'none' : 'flex';
    DOM.customRateWrapper.classList.toggle('hidden', !DOM.useCustomRate.checked);

    const amt = parseFloat(DOM.renewalAmount.value) || 0;
    const t = DOM.tradeDate.value;
    const ex = DOM.expiryDate.value;

    if (!amt || !t || !ex) { resetResults(); return; }

    const td = new Date(t);
    const ed = new Date(ex);
    const rem = (ed - td) / 86400000;
    if (rem <= 0) { resetResults(); return; }

    const totalDays = getRealCycleDays(t, cycleType);
    let rt = rates[curr] || 1;
    if (DOM.useCustomRate.checked) rt = parseFloat(DOM.customRateInput.value) || rt;

    const orig = amt * (rem / totalDays);
    const cny = orig * rt;
    let prem = parseFloat(DOM.premiumInput.value) || 0;
    let actual = 0;

    if (sourceInput === 'actualPaid') {
        actual = parseFloat(DOM.actualPaid.value) || cny;
        prem = actual - cny;
        DOM.premiumInput.value = fmt(prem);
    } else if (sourceInput === 'premiumInput') {
        actual = cny + prem;
        DOM.actualPaid.value = fmt(actual);
    } else {
        actual = parseFloat(DOM.actualPaid.value) || cny;
        prem = actual - cny;
    }

    const finalTotal = cny + prem;
    DOM.resCNYBig.innerText = `¥ ${fmt(finalTotal)}`;
    DOM.resOrig.innerText = curr === 'CNY' ? `${fmt(amt)} CNY` : `${fmt(amt)} ${curr}(≈${fmt(amt*rt)}元)`;
    DOM.remainingDays.innerText = `${fmt(rem, 1)} 天`;
    DOM.remainingProgress.style.width = Math.min(100, (rem / totalDays) * 100) + '%';
    DOM.progressHint.innerText = `总周期 ${Math.round(totalDays)} 天`;
    DOM.resActual.innerText = `¥ ${fmt(actual)}`;
    DOM.dayOfficial.innerText = `¥${fmt(cny / rem, 2)}`;
    DOM.dayActual.innerText = `¥${fmt((cny + prem) / rem, 2)}`;

    if (Math.abs(prem) < 0.01) {
        DOM.premiumBox.classList.add('hidden');
        DOM.valueRatioBox.classList.add('hidden');
    } else {
        DOM.premiumBox.classList.remove('hidden');
        DOM.premiumTitle.innerText = prem >= 0 ? '卖家溢价' : '卖家折价';
        DOM.premiumValueBig.innerText = (prem >= 0 ? '+' : '') + `¥ ${fmt(prem)}`;
        DOM.premiumValueBig.className = prem >= 0 ? 'text-2xl font-black text-red-500' : 'text-2xl font-black text-green-500';
        DOM.valueRatioBox.classList.remove('hidden');
        const total = cny + Math.max(0, prem) || 1;
        const vp = (cny / total) * 100;
        const pp = (Math.max(0, prem) / total) * 100;
        DOM.barValue.style.width = vp + '%';
        DOM.barPremium.style.width = pp + '%';
        DOM.valuePercent.innerText = fmt(vp, 1) + '%';
        DOM.premiumPercent.innerText = fmt(pp, 1) + '%';
    }
}

function resetResults() {
    DOM.resCNYBig.innerText = '¥ --';
    DOM.resOrig.innerText = '--';
    DOM.remainingDays.innerText = '-- 天';
    DOM.remainingProgress.style.width = '0%';
    DOM.progressHint.innerText = '';
    DOM.resActual.innerText = '¥ --';
    DOM.dayOfficial.innerText = '--';
    DOM.dayActual.innerText = '--';
    DOM.premiumBox.classList.add('hidden');
    DOM.valueRatioBox.classList.add('hidden');
}

function showToast(m) {
    clearTimeout(toastTimer);
    DOM.toastMsg.innerText = m;
    DOM.toast.classList.remove('hidden');
    DOM.toast.classList.add('toast-show');
    toastTimer = setTimeout(() => {
        DOM.toast.classList.remove('toast-show');
        DOM.toast.classList.add('hidden');
    }, 2000);
}

// 页面加载：只绑定一次事件，性能最优
window.onload = () => {
    fetchRealRates();
    const today = new Date();
    DOM.tradeDate.value = today.toISOString().split('T')[0];
    const expDay = new Date(today); expDay.setDate(today.getDate() + 150);
    DOM.expiryDate.value = expDay.toISOString().split('T')[0];
    DOM.premiumInput.value = '';
    DOM.actualPaid.value = '';

    document.querySelectorAll('.cycle-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            cycleType = btn.dataset.cycle;
            calculate();
        };
    });

    const inputIds = ['premiumInput', 'actualPaid', 'renewalAmount', 'tradeDate', 'expiryDate', 'useCustomRate', 'customRateInput'];
    inputIds.forEach(id => {
        document.getElementById(id).addEventListener('input', () => debounceCalculate(id));
    });

    calculate();
    DOM.renewalAmount.focus();
};

document.getElementById('copyBtn').onclick = () => {
    const map = { "1M": "月付", "3M": "季付", "6M": "半年", "1Y": "年付", "2Y": "两年" };
    const amt = DOM.resOrig.innerText;
    const cycle = map[cycleType];
    const exp = DOM.expiryDate.value;
    const val = DOM.resCNYBig.innerText;
    const prem = parseFloat(DOM.premiumInput.value) || 0;
    const pay = Math.abs(prem) < 0.01 ? val : DOM.resActual.innerText;
    let txt = `【VPS剩余价值计算】\n续费金额：${amt}\n付款周期：${cycle}\n到期日期：${exp}\n剩余价值：${val}\n`;
    if (Math.abs(prem) > 0.01) txt += `${prem >= 0 ? '溢价' : '折价'}：¥${fmt(prem)}\n`;
    txt += `实付金额：${pay}`;
    navigator.clipboard.writeText(txt);
    showToast('已复制详情');
};
