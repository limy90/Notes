#Bug实付卖家金额计算  点击切换货币

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS剩余价值计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400,500,700,900&display=swap');
        body { background: #eef2f7; font-family: 'DM Sans', 'PingFang SC', sans-serif; min-height: 100vh; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .cycle-btn { transition: all .15s; border: 1.5px solid #e2e8f0; background: white; color: #94a3b8; font-weight: 700; font-size: 12px; border-radius: 10px; padding: 8px 0; cursor: pointer; width: 100%; }
        .cycle-btn.active { background: #00BFA5; border-color: #00BFA5; color: white; box-shadow: 0 4px 14px rgba(0,191,165,.35); }
        .field-label { font-size: 10px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
        .field-input { width: 100%; padding: 11px 14px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-weight: 600; color: #1e293b; outline: none; transition: all .15s; }
        .field-input:focus { border-color: #00BFA5; background: white; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,.07); }
        .result-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .result-value { font-size: 13px; font-weight: 800; color: #1e293b; }
        @keyframes toast-in { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
        .toast-show { animation: toast-in .25s ease forwards; display: flex !important; }
        #rateRefreshTimer { cursor: pointer; user-select: none; }
        input[type="date"] {
            padding-left: 10px !important;
            padding-right: 4px !important;
            letter-spacing: -0.5px !important;
            min-width: 0;
        }
        input::-webkit-calendar-picker-indicator {
            margin-left: 0px !important;
            padding: 0px !important;
            width: 16px !important;
            cursor: pointer;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none hidden bg-gray-900 text-white text-xs font-bold px-5 py-2.5 rounded-full shadow-2xl items-center gap-2">
        <i id="toastIcon" class="fas fa-check-circle text-emerald-400"></i><span id="toastMsg"></span>
    </div>

    <div class="max-w-5xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-5">
            <div class="lg:col-span-7 space-y-4">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <p class="field-label">① 续费信息</p>
                    <div class="grid grid-cols-1 sm:grid-cols-5 gap-3 mb-4">
                        <div class="sm:col-span-3">
                            <div class="field-label">续费金额</div>
                            <input type="number" id="renewalAmount" class="field-input" placeholder="请输入金额" min="0" autofocus>
                        </div>
                        <div class="sm:col-span-2">
                            <div class="field-label flex justify-between"><span>计价币种</span><label id="customRateToggleBox" class="flex items-center gap-1 cursor-pointer normal-case"><input type="checkbox" id="useCustomRate" class="accent-[#00BFA5]"> 自定义</label></div>
                            <select id="currencySelector" class="field-input cursor-pointer">
                                <option value="USD">USD · 美元</option><option value="CNY">CNY · 人民币</option><option value="EUR">EUR · 欧元</option><option value="GBP">GBP · 英镑</option><option value="HKD">HKD · 港币</option><option value="SGD">SGD · 新加坡元</option><option value="AUD">AUD · 澳元</option><option value="CAD">CAD · 加元</option><option value="CHF">CHF · 瑞士法郎</option><option value="TWD">TWD · 新台币</option>
                            </select>
                            <div id="customRateWrapper" class="hidden mt-2 flex items-center gap-1.5 bg-gray-50 p-1.5 rounded-lg border">
                                <span class="text-[10px] font-bold text-gray-400 pl-1">1 <span id="customRateLabel">USD</span> =</span>
                                <input type="number" id="customRateInput" class="field-input !py-1 !px-2 !text-[12px] !bg-white" placeholder="汇率" min="0">
                                <span class="text-[10px] font-bold text-gray-400 pr-1">CNY</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mt-4">
                        <div class="flex items-center justify-between mb-3">
                            <p class="text-xs font-black text-gray-400 uppercase tracking-widest">
                                <i class="fas fa-chart-area mr-1.5" style="color:#00BFA5"></i>实时汇率 (1货币=多少人民币)
                            </p>
                            <div class="flex items-center gap-2">
                                <span id="rateStatus" class="hidden text-[10px] bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded-full font-bold">
                                    <i class="fas fa-check mr-1"></i>已更新
                                </span>
                                <span id="rateRefreshTimer" class="text-[10px] text-gray-400 font-bold cursor-pointer"></span>
                                <span class="text-[10px] text-gray-300 font-bold">EXCHANGERATE-API</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-5 gap-2" id="rateGrid"></div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <p class="field-label">② 时间信息</p>
                        <button id="toggleTimePrecision" class="text-[10px] text-gray-400 font-bold hover:text-[#00BFA5] transition-colors">
                            <i class="fas fa-clock mr-1"></i>精确到时分
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <div class="field-label">交易日期</div>
                            <input type="date" id="tradeDate" class="field-input date-input-nav">
                        </div>
                        <div>
                            <div class="field-label">到期日期</div>
                            <input type="date" id="expiryDate" class="field-input date-input-nav">
                        </div>
                    </div>
                    <div class="field-label">付款周期（仅用于剩余天数比例计算）</div>
                    <div class="grid grid-cols-6 gap-2" id="cycleSelector">
                        <button class="cycle-btn" data-cycle="30">月付</button>
                        <button class="cycle-btn" data-cycle="91">季付</button>
                        <button class="cycle-btn" data-cycle="182">半年</button>
                        <button class="cycle-btn active" data-cycle="365">年付</button>
                        <button class="cycle-btn" data-cycle="730">两年</button>
                        <button class="cycle-btn" data-cycle="1095">三年</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                    <p class="field-label">③ 交易结算</p>
                    <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 mb-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-[10px] font-black text-emerald-600 mb-1.5">实付卖家 (CNY)</div>
                                <input type="number" id="actualPaid" class="field-input" min="0">
                            </div>
                            <div>
                                <div class="text-[10px] font-black text-emerald-600 mb-1.5">溢价/折价 (CNY)</div>
                                <input type="number" id="premiumInput" class="field-input" value="0">
                            </div>
                        </div>
                        <div id="bindHint" class="text-[9px] text-emerald-700 font-bold mt-2.5">
                            <i class="fas fa-lock mr-1"></i>正数=溢价，负数=折价，手动修改生效
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 lg:row-span-2">
                <div class="sticky top-6 bg-white rounded-2xl overflow-hidden shadow-xl border-b-4 border-[#00BFA5] p-7">
                    <div class="text-center mb-6">
                        <p class="text-[#00BFA5] text-[10px] font-black tracking-widest mb-1">买家最终总支出 (CNY)</p>
                        <div id="resCNYBig" class="text-5xl font-black text-gray-800">¥ --</div>
                    </div>
                    <div id="premiumBox" class="hidden text-center mb-6 border-t border-gray-100 pt-4">
                        <p id="premiumTitle" class="text-[10px] font-black mb-1">卖家溢价</p>
                        <div id="premiumValueBig" class="text-2xl font-black text-red-500">--</div>
                    </div>
                    <div class="space-y-2 border-t border-gray-100 pt-4">
                        <div class="result-row"><span class="result-label">折合原币</span><span id="resOrig" class="result-value">--</span></div>
                        <div class="result-row"><span class="result-label">实付卖家</span><span id="resActual" class="result-value">¥ --</span></div>
                        <div class="result-row"><span class="result-label">官方日均</span><span id="dayOfficial" class="result-value">--</span></div>
                        <div class="result-row border-none"><span class="result-label text-[#00BFA5]">综合日均</span><span id="dayActual" class="result-value text-[#00BFA5]">--</span></div>
                    </div>
                    
                    <div style="margin-top:24px">
                        <div style="display:flex; justify-content:space-between; align-items:center; font-size:10px; font-weight:800; text-transform:uppercase; margin-bottom:6px;">
                            <span style="color:#475569">剩余有效期</span>
                            <span id="remainingDays" style="color:#00BFA5; font-size:14px; font-weight:900;">-- 天</span>
                        </div>
                        <div style="background:rgba(0,0,0,.07); border-radius:99px; height:6px; overflow:hidden">
                            <div id="remainingProgress" class="progress-bar" style="width:0%"></div>
                        </div>
                        <div id="progressHint" style="text-align:right; font-size:10px; color:#475569; font-weight:700; margin-top:4px;"></div>
                    </div>

                    <div id="valueRatioBox" class="mt-5 pt-5 border-t border-gray-100 hidden">
                        <div class="flex justify-between text-[10px] font-black mb-1.5 uppercase text-gray-500"><span>价值构成比例</span></div>
                        <div class="h-3 bg-gray-100 rounded-full overflow-hidden flex">
                            <div id="barValue" class="h-full bg-[#00BFA5] transition-all duration-500" style="width:0%"></div>
                            <div id="barPremium" class="h-full bg-orange-400 transition-all duration-500" style="width:0%"></div>
                        </div>
                        <div class="flex gap-4 mt-2 text-[9px] font-bold text-gray-400">
                            <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-[#00BFA5]"></span>剩余价值</div>
                            <div class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-orange-400"></span>溢价部分</div>
                        </div>
                    </div>

                    <div class="flex gap-2 mt-6">
                        <button id="copyBtn" class="flex-1 py-4 bg-[#00BFA5] rounded-xl font-black text-sm shadow-lg hover:scale-[1.02] transition-all text-white"><i class="fas fa-copy mr-2"></i>复制详情喵</button>
                        <button id="shareBtn" class="px-5 bg-gray-700 rounded-xl font-black text-sm hover:scale-[1.02] transition-all text-white"><i class="fas fa-link"></i></button>
                        <button id="resetBtn" class="px-5 bg-red-500/10 text-red-500 rounded-xl font-black text-sm hover:scale-[1.02] transition-all"><i class="fas fa-rotate-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cycleDays = 365, isDateTime = false, toastTimer = null;
        let rates = { USD:7.23, EUR:7.82, GBP:9.12, HKD:0.92, SGD:5.38, AUD:4.75, CAD:5.32, CHF:8.1, TWD:0.23, CNY:1 };
        const RATE_CACHE_MINUTES = 60;
        let rateRefreshInterval = null;

        const fmt = (n, d=2) => n.toFixed(d);
        const getEl = id => document.getElementById(id);
        const getLocalISO = (d, isDT) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, isDT ? 16 : 10);

        function initDateNav() {
            document.querySelectorAll('.date-input-nav').forEach(input => {
                input.addEventListener('input', function(e) {
                    const val = this.value;
                    if (val.length === 4) setTimeout(() => this.seekForward(), 10);
                    if (val.length === 7) setTimeout(() => this.seekForward(), 10);
                });
            });
        }

        function renderRateGrid() {
            const grid = getEl('rateGrid');
            grid.innerHTML = '';
            const currencyList = [
                { code: 'CNY', name: '人民币' },{ code: 'USD', name: '美元' },{ code: 'EUR', name: '欧元' },
                { code: 'GBP', name: '英镑' },{ code: 'HKD', name: '港币' },{ code: 'SGD', name: '新加坡元' },
                { code: 'AUD', name: '澳元' },{ code: 'CAD', name: '加元' },{ code: 'CHF', name: '瑞士法郎' },
                { code: 'TWD', name: '新台币' }
            ];
            
            currencyList.forEach(c => {
                const rate = rates[c.code];
                if(!rate) return;
                grid.innerHTML += `
                    <div class="text-center p-2 rounded-xl border flex flex-col justify-center items-center border-slate-100 bg-slate-50">
                        <div class="flex items-center gap-1">
                            <span class="text-[9px] font-black tracking-wider font-bold text-slate-400">${c.code} · ${c.name}</span>
                        </div>
                        <div class="text-[11px] font-extrabold text-slate-700 mt-1">${rate.toFixed(3)}</div>
                    </div>`;
            });
        }

        function startRateRefreshTimer() {
            clearInterval(rateRefreshInterval);
            const updateTimer = () => {
                const cache = JSON.parse(localStorage.getItem('rateCache'));
                if (!cache) { getEl('rateRefreshTimer').innerText = '已缓存'; return; }
                const now = Date.now();
                const expire = cache.timestamp + RATE_CACHE_MINUTES * 60 * 1000;
                const left = Math.max(0, expire - now);
                const min = Math.floor(left / 60000);
                const sec = Math.floor((left % 60000) / 1000);
                getEl('rateRefreshTimer').innerText = `${min}分${sec}秒`;
                if (left <= 0) fetchLiveRates(true);
            };
            updateTimer();
            rateRefreshInterval = setInterval(updateTimer, 1000);
        }

        async function fetchLiveRates(force = false) {
            try {
                const cache = JSON.parse(localStorage.getItem('rateCache'));
                if (!force && cache && (Date.now() - cache.timestamp) < RATE_CACHE_MINUTES * 60 * 1000) {
                    rates = cache.data; renderRateGrid(); calculate(); startRateRefreshTimer(); return;
                }
                const res = await fetch('https://v6.exchangerate-api.com/v6/416fc7318db286baaf635434/latest/USD');
                if (!res.ok) throw new Error();
                const data = await res.json();
                const usdToCny = data.conversion_rates.CNY;
                
                Object.assign(rates, {
                    USD: usdToCny, EUR: usdToCny / data.conversion_rates.EUR, GBP: usdToCny / data.conversion_rates.GBP,
                    HKD: usdToCny / data.conversion_rates.HKD, SGD: usdToCny / data.conversion_rates.SGD, AUD: usdToCny / data.conversion_rates.AUD,
                    CAD: usdToCny / data.conversion_rates.CAD, CHF: usdToCny / data.conversion_rates.CHF, TWD: usdToCny / data.conversion_rates.TWD
                });
                
                localStorage.setItem('rateCache', JSON.stringify({ timestamp: Date.now(), data: rates }));
                const badge = getEl('rateStatus');
                badge.classList.remove('hidden');
                setTimeout(() => badge.classList.add('hidden'), 3000);
            } catch(e) { console.error('汇率获取失败:', e); }
            renderRateGrid(); calculate(); startRateRefreshTimer();
        }

        function calculate() {
            const curr = getEl('currencySelector').value;
            getEl('customRateLabel').innerText = curr;
            
            const customToggleBox = getEl('customRateToggleBox');
            const customToggle = getEl('useCustomRate');
            const customWrap = getEl('customRateWrapper');
            if(curr === 'CNY') { customToggle.checked = false; customToggleBox.style.display = 'none'; } 
            else { customToggleBox.style.display = 'flex'; }
            customWrap.classList.toggle('hidden', !customToggle.checked);

            const amount = parseFloat(getEl('renewalAmount').value);
            const trade = new Date(getEl('tradeDate').value), expiry = new Date(getEl('expiryDate').value);
            const days = (expiry - trade) / 86400000;

            if(isNaN(amount) || days <= 0) return resetResults(days);
            
            let rate = rates[curr] || 1;
            if(customToggle.checked) rate = parseFloat(getEl('customRateInput').value) || rate;
            
            const resOrig = (amount / cycleDays) * days;
            const resCNY = resOrig * rate;

            let prem = parseFloat(getEl('premiumInput').value) || 0;
            let actPaid = resCNY + prem;
            getEl('actualPaid').value = fmt(actPaid);

            const totalBuyerCost = actPaid;

            getEl('resCNYBig').innerText = `¥ ${fmt(totalBuyerCost)}`;
            getEl('resOrig').innerText = `${fmt(resOrig)} ${curr}`;
            
            const pct = Math.min((days / cycleDays) * 100, 100);
            getEl('remainingDays').innerText = `${fmt(days, isDateTime ? 2 : 0)} 天`;
            getEl('remainingDays').style.color = '#00BFA5';
            getEl('remainingProgress').style.width = `${pct}%`;
            getEl('progressHint').innerText = `剩余 ${pct.toFixed(1)}% 周期`;
            
            if(!isNaN(actPaid) && actPaid >= 0) {
                getEl('resActual').innerText = `¥ ${fmt(actPaid)}`;
                
                getEl('premiumBox').classList.remove('hidden');
                getEl('premiumTitle').innerText = prem >=0 ? '卖家溢价' : '卖家折价';
                getEl('premiumValueBig').innerText = `${prem>=0?'+':''}¥ ${fmt(prem)}`;
                getEl('premiumValueBig').className = prem >= 0 
                    ? "text-2xl font-black text-red-500" 
                    : "text-2xl font-black text-green-500";
                
                getEl('dayActual').innerText = `¥${fmt(totalBuyerCost/days, 3)} / 天`;

                getEl('valueRatioBox').classList.remove('hidden');
                const totalPart = resCNY + Math.max(0, prem) || 1;
                getEl('barValue').style.width = `${(resCNY/totalPart)*100}%`;
                getEl('barPremium').style.width = `${(Math.max(0, prem)/totalPart)*100}%`;
            } else {
                getEl('premiumBox').classList.add('hidden');
                getEl('resActual').innerText = '¥ --';
                getEl('dayActual').innerText = '--';
                getEl('valueRatioBox').classList.add('hidden');
                getEl('barValue').style.width = '0%'; getEl('barPremium').style.width = '0%';
            }
            getEl('dayOfficial').innerText = `¥${fmt(resCNY/days, 3)} / 天`;
        }

        function resetResults(days) {
            getEl('resCNYBig').innerText = '¥ --';
            getEl('remainingDays').innerText = days <= 0 ? '已到期' : '-- 天';
            getEl('remainingDays').style.color = days <= 0 ? '#f87171' : '#00BFA5';
            getEl('remainingProgress').style.width = '0%';
            getEl('progressHint').innerText = days <= 0 ? '该机器已在交易日前到期' : '';
            getEl('premiumBox').classList.add('hidden');
            getEl('valueRatioBox').classList.add('hidden');
            getEl('dayOfficial').innerText = '--'; getEl('dayActual').innerText = '--';
            getEl('resOrig').innerText = '--'; getEl('resActual').innerText = '¥ --';
        }

        window.onload = () => {
            renderRateGrid(); 
            fetchLiveRates();
            initDateNav();
            
            const today = new Date();
            getEl('tradeDate').value = getLocalISO(today, false);
            const halfYearLater = new Date(today);
            halfYearLater.setDate(today.getDate() + 182);
            getEl('expiryDate').value = getLocalISO(halfYearLater, false);

            getEl('premiumInput').value = '0';
            document.querySelectorAll('.cycle-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.cycle) === cycleDays));

            getEl('rateRefreshTimer').onclick = () => {
                fetchLiveRates(true);
                showToast('已强制刷新汇率');
            };

            bindCalcEvents();
            calculate();
            getEl('renewalAmount').focus();
        };

        function bindCalcEvents() {
            getEl('premiumInput').addEventListener('input', calculate);
            const calcIds = [
                'renewalAmount','currencySelector','tradeDate','expiryDate',
                'useCustomRate','customRateInput'
            ];
            calcIds.forEach(id => {
                const el = getEl(id);
                el.onchange = calculate;
                el.oninput = calculate;
            });

            document.querySelectorAll('.cycle-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelector('.cycle-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    cycleDays = parseInt(btn.dataset.cycle);
                    calculate();
                };
            });
        }

        getEl('toggleTimePrecision').onclick = () => {
            isDateTime = !isDateTime;
            getEl('toggleTimePrecision').classList.toggle('text-[#00BFA5]', isDateTime);
            getEl('tradeDate').type = isDateTime ? 'datetime-local' : 'date'; 
            getEl('expiryDate').type = isDateTime ? 'datetime-local' : 'date';
            calculate();
        };

        getEl('copyBtn').onclick = () => { 
            const text = `【VPS 剩余价值详情】\n剩余价值: ${getEl('resCNYBig').innerText}\n有效期: ${getEl('remainingDays').innerText}\n实付卖家: ${getEl('resActual').innerText}\n综合日均: ${getEl('dayActual').innerText}`;
            navigator.clipboard.writeText(text); showToast('详情已复制');
        };
        
        getEl('shareBtn').onclick = () => { 
            const p = new URLSearchParams();
            ['renewalAmount','currencySelector','tradeDate','expiryDate','premiumInput'].forEach(id => {
                const v = getEl(id).value; if(v !== '') p.set(id, v);
            });
            p.set('cycleDays', cycleDays);
            if(isDateTime) p.set('isDateTime', '1');
            if(getEl('useCustomRate').checked) { p.set('useCustomRate', '1'); p.set('customRateInput', getEl('customRateInput').value); }
            const shareUrl = window.location.origin + window.location.pathname + '?' + p.toString();
            navigator.clipboard.writeText(shareUrl); 
            showToast('状态专属链接已生成并复制'); 
        };
        
        getEl('resetBtn').onclick = () => { window.location.href = window.location.origin + window.location.pathname; };

        function showToast(m) { 
            clearTimeout(toastTimer); const t = getEl('toast'); getEl('toastMsg').innerText = m; 
            t.classList.remove('hidden'); t.classList.add('toast-show');
            toastTimer = setTimeout(() => { t.classList.remove('toast-show'); t.classList.add('hidden'); }, 2000);
        }
    </script>
</body>
</html>
